# SproutDrive — Render.com (free tier)
# Docs: docs/DEPLOY.md
# Deploy: connect GitHub repo at https://dashboard.render.com

services:
  - type: web
    name: sproutdrive
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        value: sproutdrive-a975e
      - key: FIREBASE_ORG_ID
        value: default
      - key: SEED_SAMPLE_DATA
        value: "false"
      # Add manually in Render dashboard (Secret):
      # FIREBASE_SERVICE_ACCOUNT_JSON = entire service account JSON on one line
